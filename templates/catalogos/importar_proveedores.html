{% extends "base.html" %}

{% block title %}Importar proveedores{% endblock %}
{% block page_title %}Importar proveedores{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">

    <div class="card shadow-sm border-0 sg-form-card">
      <div class="card-body">

        <h5 class="fw-bold mb-3">
          Importar proveedores
        </h5>

        <p class="sg-form-help mb-4">
          Sube el archivo <strong>proveedores.xlsx</strong> con las columnas:
          <code>nombre</code>, <code>telefono</code>, <code>email</code>.
        </p>

        <form method="post" enctype="multipart/form-data" class="sg-form-section">
          {% csrf_token %}

          <input
            type="file"
            name="archivo"
            class="form-control mb-3 sg-form-control"
            accept=".xlsx,.xls"
            required
          >

          <div class="sg-form-actions sg-form-actions-compact">
            <button class="sg-btn-primary sg-btn-lg w-100">
            Importar proveedores
            </button>
          </div>
        </form>

      </div>
    </div>

  </div>
</div>
{% endblock %}
