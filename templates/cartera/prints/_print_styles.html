{% load static %}
<style>
  @page{ size: letter portrait; margin: 10mm; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:Arial, Helvetica, sans-serif; color:#111; background:#f2f4f7; font-size:12px; }
  .toolbar{ position:sticky; top:0; z-index:10; display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px 14px; background:#fff; border-bottom:1px solid #ddd; box-shadow:0 2px 10px rgba(0,0,0,.06); }
  .toolbar-title{ font-weight:700; }
  .toolbar-actions{ display:flex; gap:8px; }
  .btn{ border:1px solid #222; border-radius:8px; padding:7px 12px; background:#fff; cursor:pointer; font-size:13px; text-decoration:none; color:#111; }
  .btn-primary{ background:#111; color:#fff; }
  .sheet{ width:216mm; min-height:279mm; margin:12px auto; background:#fff; padding:12mm; box-shadow:0 8px 28px rgba(0,0,0,.10); }
  .doc-header{ display:flex; justify-content:space-between; align-items:flex-start; gap:14px; border-bottom:2px solid #111; padding-bottom:10px; margin-bottom:12px; }
  .brand{ display:flex; gap:12px; align-items:flex-start; }
  .logo{ width:92px; max-height:70px; object-fit:contain; }
  .brand-name{ font-size:18px; font-weight:800; line-height:1.15; }
  .brand-owner{ font-size:12px; font-weight:700; }
  .brand-data{ margin-top:4px; color:#333; line-height:1.25; }
  .doc-meta{ text-align:right; min-width:180px; }
  .doc-title{ font-size:18px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; }
  .doc-subtitle{ margin-top:4px; color:#555; }
  .section{ margin-top:12px; }
  .section-title{ font-size:13px; font-weight:800; text-transform:uppercase; border-bottom:1px solid #222; padding-bottom:4px; margin-bottom:7px; }
  .grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .box{ border:1px solid #222; min-height:42px; }
  .label{ background:#f3f4f6; border-bottom:1px solid #222; font-size:10px; font-weight:800; text-transform:uppercase; padding:4px 6px; }
  .value{ padding:6px; font-size:12px; line-height:1.25; }
  table{ width:100%; border-collapse:collapse; }
  th,td{ border:1px solid #222; padding:5px 6px; vertical-align:top; }
  th{ background:#f3f4f6; font-size:10px; text-transform:uppercase; text-align:center; }
  td.text-end, th.text-end{ text-align:right; }
  td.text-center, th.text-center{ text-align:center; }
  .fw{ font-weight:800; }
  .muted{ color:#666; }
  .totals{ margin-left:auto; width:50%; }
  .small{ font-size:10px; }
  .footer{ margin-top:18px; padding-top:8px; border-top:1px solid #bbb; display:flex; justify-content:space-between; gap:10px; color:#555; font-size:10px; }
  .avoid-break{ page-break-inside:avoid; }
  @media print{ body{ background:#fff; } .toolbar{ display:none!important; } .sheet{ width:auto; min-height:auto; margin:0; padding:0; box-shadow:none; } a{ color:inherit; text-decoration:none; } }
</style>
