{% extends "base.html" %}

{% block title %}Importar clientes{% endblock %}
{% block page_title %}Importar clientes{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">

    <div class="card shadow-sm border-0">
      <div class="card-body">

        <h5 class="fw-bold mb-3">
          Importar clientes
        </h5>

        <p class="text-muted mb-4">
          Sube el archivo <strong>clientes.xlsx</strong> con las columnas:
          <code>nombre</code>, <code>telefono</code>, <code>email</code>.
        </p>

        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}

          <input
            type="file"
            name="archivo"
            class="form-control mb-3"
            accept=".xlsx,.xls"
            required
          >

          <button class="btn btn-primary w-100">
            Importar clientes
          </button>
        </form>

      </div>
    </div>

  </div>
</div>
{% endblock %}
